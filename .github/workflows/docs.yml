name: Documentation

on:
  push:
    branches: [ main ]
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check README structure
      run: |
        echo "📚 Checking documentation structure..."
        
        if [ -f "README.md" ]; then
          echo "✅ README.md exists"
          
          # Check if README has essential sections
          if grep -qi "# Charta\|# IKore Engine" README.md; then
            echo "✅ Project title found"
          else
            echo "⚠️  Project title not found in README"
          fi
          
          if grep -qi "building\|build" README.md; then
            echo "✅ Build instructions found"
          else
            echo "⚠️  Build instructions not found in README"
          fi
          
          # Check for broken links (basic check)
          if grep -o "http[s]*://[^)]*" README.md | while read url; do
            echo "🔗 Found URL: $url"
          done; then
            echo "✅ URLs found in README"
          fi
        else
          echo "❌ README.md not found"
          exit 1
        fi

    - name: Check for documentation completeness
      run: |
        echo "📋 Checking documentation completeness..."
        
        # Check if source files have documentation
        find src/ -name "*.h" | while read header; do
          if grep -q "//\|/\*" "$header"; then
            echo "✅ $header has comments"
          else
            echo "⚠️  $header may need more documentation"
          fi
        done

    - name: Validate markdown files
      run: |
        echo "🔍 Validating markdown files..."
        find . -name "*.md" -not -path "./build/*" -not -path "./_deps/*" | while read md_file; do
          if [ -s "$md_file" ]; then
            echo "✅ $md_file is valid"
          else
            echo "⚠️  $md_file is empty"
          fi
        done

    - name: Check the launch guides exist
      run: |
        echo "📚 Checking the top-level guides (#377)..."
        for f in docs/PLAYER_GUIDE.md docs/DEVELOPER_ADD_A_MECHANIC.md docs/ARCHITECTURE.md; do
          if [ -f "$f" ]; then echo "✅ $f"; else echo "❌ missing $f"; exit 1; fi
        done

    - name: Check internal doc links resolve
      run: |
        echo "🔗 Checking relative markdown links in README + docs/ ..."
        rm -f /tmp/broken_links
        for f in README.md docs/*.md; do
          [ -f "$f" ] || continue
          dir=$(dirname "$f")
          # Strip fenced code blocks first: C++ lambdas like [](std::shared_ptr<T> x)
          # would otherwise be picked up as markdown links.
          awk '/^[[:space:]]*```/ { fenced = !fenced; next } !fenced' "$f" \
            | grep -oE '\]\(([^)]+)\)' | sed -E 's/^\]\(//; s/\)$//' | while read -r target; do
            case "$target" in http*|mailto:*|\#*|*" "*) continue ;; esac
            path="${target%%#*}"
            [ -z "$path" ] && continue
            if [ ! -e "$dir/$path" ]; then
              echo "❌ $f: broken link -> $target"
              echo broken >> /tmp/broken_links
            fi
          done
        done
        if [ -f /tmp/broken_links ]; then
          echo "Broken internal links found."; exit 1
        fi
        echo "✅ all internal links resolve"

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install spell checker
      run: |
        sudo apt-get update
        sudo apt-get install -y aspell aspell-en

    - name: Run spell check on markdown files
      run: |
        echo "📝 Running spell check on documentation..."
        
        # Create a simple word list for technical terms
        {
          echo "personal_ws-1.1 en 30"
          printf '%s\n' \
            OpenGL GLFW CMake GitHub IKore vcpkg macOS Ubuntu \
            workflow backends renderer API APIs enum namespace bool \
            hpp cpp inline const struct typedef templating
        } > .aspell.en.pws
        
        find . -name "*.md" -not -path "./build/*" -not -path "./_deps/*" | while read md_file; do
          echo "Checking $md_file..."
          # Use aspell list mode to just report misspelled words without interactive prompts
          cat "$md_file" | aspell --home-dir=. --personal=.aspell.en.pws --lang=en \
            --mode=markdown list | head -10 || true
          echo "✅ Spell check completed for $md_file"
        done
