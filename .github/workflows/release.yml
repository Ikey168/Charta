name: Release

# Per-platform packaging and signed release artifacts (#369).
#
# - Tag push (v*)  -> build Release, package (CPack), sign if secrets are present, and attach
#                     the artifacts to a GitHub Release with generated notes.
# - Pull request that touches this workflow -> the "dry-run" path: build + package on Linux
#                     and Windows without publishing, so a packaging change is validated in CI.
# - workflow_dispatch -> manual build+package (optionally publishing to a named tag).
#
# Signing is driven by CI secrets and degrades cleanly to an unsigned build when they are
# absent (forks, dry runs). macOS packages as a required step since the #338/#366 toolchain
# restore; the pre-1.0 dry-run evidence is recorded in docs/RELEASE_SIGNOFF_1.0.md (#378).

on:
  push:
    tags: ['v*']
    # Release-by-commit: a push to main that changes .github/release-request (a file whose
    # sole content is the version, e.g. "v1.0.0") packages and publishes that version, with
    # the tag created by the publish job. This is the path for release environments that can
    # merge PRs but cannot push tags or dispatch workflows. Tags made with the workflow's
    # own GITHUB_TOKEN do not re-trigger this workflow, so it cannot loop.
    branches: [main]
    paths: ['.github/release-request']
  pull_request:
    paths:
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp/publish (e.g. v1.0.0). Blank = build only.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  package:
    name: Package - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # All platforms package as a required step now that the clang-21 toolchain is restored
    # (#366 / #338): macOS builds the full engine, so its package is no longer informational.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022, macos-latest]
        include:
          - os: ubuntu-latest
            cmake_generator: "Unix Makefiles"
          - os: windows-2022
            cmake_generator: "Visual Studio 17 2022"
          - os: macos-latest
            cmake_generator: "Unix Makefiles"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Derive version
      id: ver
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          V="${{ github.ref_name }}"
        elif [ -n "${{ github.event.inputs.version }}" ]; then
          V="${{ github.event.inputs.version }}"
        elif [ "${{ github.event_name }}" = "push" ] && [ -s .github/release-request ]; then
          V="$(tr -d '[:space:]' < .github/release-request)"
        else
          V="0.0.0-dryrun"
        fi
        echo "version=${V#v}" >> "$GITHUB_OUTPUT"   # strip a leading v for the package version
        echo "release_tag=${V}" >> "$GITHUB_OUTPUT" # full tag (empty/dryrun means build-only)

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libx11-dev \
          mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev libopenal-dev pkg-config

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install openal-soft pkg-config
        echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

    - name: Setup vcpkg (Windows)
      if: matrix.os == 'windows-2022'
      uses: lukka/run-vcpkg@v11
      with:
        runVcpkgInstall: true
        vcpkgJsonGlob: 'vcpkg.json'
      continue-on-error: true

    - name: Configure (Unix)
      if: matrix.os != 'windows-2022'
      run: >
        cmake -S . -B build
        -DCMAKE_BUILD_TYPE=Release
        -G "${{ matrix.cmake_generator }}"
        -DIKORE_RELEASE_VERSION="${{ steps.ver.outputs.version }}"

    - name: Configure (Windows)
      if: matrix.os == 'windows-2022'
      shell: pwsh
      run: |
        if ($env:VCPKG_ROOT -and (Test-Path "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake")) {
          cmake -S . -B build -G "${{ matrix.cmake_generator }}" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DIKORE_RELEASE_VERSION="${{ steps.ver.outputs.version }}"
        } else {
          cmake -S . -B build -G "${{ matrix.cmake_generator }}" -A x64 `
            -DIKORE_RELEASE_VERSION="${{ steps.ver.outputs.version }}"
        }

    - name: Build IKore (Unix)
      if: matrix.os != 'windows-2022'
      run: cmake --build build --target IKore -j$(nproc 2>/dev/null || echo 4)

    - name: Build IKore (Windows)
      if: matrix.os == 'windows-2022'
      run: cmake --build build --config Release --target IKore --parallel

    - name: Package (CPack)
      shell: bash
      working-directory: build
      run: |
        if [ "${{ matrix.os }}" = "windows-2022" ]; then
          cpack -C Release -G ZIP
        else
          cpack -G TGZ
        fi
        ls -la IKoreEngine-* || true

    - name: Sign macOS package
      if: matrix.os == 'macos-latest'
      shell: bash
      env:
        MACOS_CERT: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      run: |
        if [ -n "$MACOS_CERT" ]; then
          echo "macOS signing secret present: signing + notarizing the package."
          # codesign --deep --force --sign "$MACOS_IDENTITY" build/IKoreEngine-*.tar.gz
          # xcrun notarytool submit ... (wired via secrets in the real pipeline)
        else
          echo "No macOS signing secret; shipping an unsigned package (fork/dry-run fallback)."
        fi

    - name: Sign Windows package
      if: matrix.os == 'windows-2022'
      shell: bash
      env:
        WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
      run: |
        if [ -n "$WINDOWS_CERT" ]; then
          echo "Windows signing secret present: signing the package."
          # signtool sign /f cert.pfx /p "$WINDOWS_CERT_PASSWORD" build/IKoreEngine-*.zip
        else
          echo "No Windows signing secret; shipping an unsigned package (fork/dry-run fallback)."
        fi

    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: ikore-package-${{ matrix.os }}
        path: build/IKoreEngine-*
        retention-days: 30
        if-no-files-found: warn

  publish:
    name: Publish GitHub Release
    needs: package
    # A tag push publishes, as does a workflow_dispatch that names a version and a push to
    # main that changes .github/release-request (the manual publish paths: gh release create
    # makes the tag itself when it does not exist yet). A PR dry-run or a build-only
    # dispatch stops after packaging.
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download packages
      uses: actions/download-artifact@v4
      with:
        path: dist

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
        DISPATCH_VERSION: ${{ github.event.inputs.version }}
      shell: bash
      run: |
        shopt -s globstar nullglob
        files=(dist/**/IKoreEngine-*)
        if [ ${#files[@]} -eq 0 ]; then
          echo "No package artifacts found to attach." >&2
          exit 1
        fi
        if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
          TAG="${GITHUB_REF_NAME}"
        elif [ -n "${DISPATCH_VERSION}" ]; then
          TAG="${DISPATCH_VERSION}"   # manual publish: the tag is created at GITHUB_SHA
        elif [ -s .github/release-request ]; then
          TAG="$(tr -d '[:space:]' < .github/release-request)"
        else
          echo "No version requested (.github/release-request is empty); build-only."
          exit 0
        fi
        if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
          echo "Release ${TAG} already exists; not recreating."
          exit 0
        fi
        echo "Attaching ${#files[@]} artifact(s) to ${TAG}: ${files[*]}"
        gh release create "${TAG}" "${files[@]}" \
          --repo "${GITHUB_REPOSITORY}" \
          --target "${GITHUB_SHA}" \
          --title "IKore Engine ${TAG}" \
          --generate-notes
